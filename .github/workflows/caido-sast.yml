name: Caido SAST Security Scan

on:
  pull_request: # すべてのPRが対象
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      pull-requests: write # PRへのコメント投稿に必須

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Binary URL and Format
        id: set_url
        run: |
          # APIから最新のJSONを取得
          JSON_DATA=$(curl -s https://api.caido.io/releases/latest)
          
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            # Linux x86_64 のリンクを抽出
            URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "linux" and .arch == "x86_64") | .link')
            FORMAT="tar.gz"
          else
            # macOS のアーキテクチャを判定してリンクを抽出
            ARCH=$(uname -m)
            if [[ "$ARCH" == "arm64" ]]; then
              URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "macos" and .arch == "aarch64") | .link')
            else
              URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "macos" and .arch == "x86_64") | .link')
            fi
            FORMAT="zip"
          fi
          
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "FORMAT=$FORMAT" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Caido CLI
        run: |
          URL="${{ steps.set_url.outputs.URL }}"
          FORMAT="${{ steps.set_url.outputs.FORMAT }}"
          
          # 1. ダウンロードと解凍
          if [[ "$FORMAT" == "tar.gz" ]]; then
            curl -L "$URL" -o caido_archive.tar.gz
            tar -xzf caido_archive.tar.gz
          else
            curl -L "$URL" -o caido_archive.zip
            # -o で上書き確認をスキップ
            unzip -o caido_archive.zip
          fi
          
          # 2. 実行ファイルを「正確に」探し出す
          # .yml, .json, .zip, .gz を除外して「caido」が含まれるファイルを探す
          CAIDO_PATH=$(find . -maxdepth 2 -type f \( -name "caido" -o -name "caido-cli" \) -not -path "*/.*" | head -n 1)
          
          # もし上記で見つからない場合の予備（caidoで始まり、拡張子がないものを探す）
          if [ -z "$CAIDO_PATH" ]; then
             CAIDO_PATH=$(find . -type f -name "caido*" ! -name "*.yml" ! -name "*.json" ! -name "*.gz" ! -name "*.zip" | head -n 1)
          fi

          if [ -z "$CAIDO_PATH" ]; then
            echo "Error: Binary not found."
            ls -R
            exit 1
          fi
          
          # 3. リネームしてパスを通す
          echo "Found binary at: $CAIDO_PATH"
          mv "$CAIDO_PATH" ./caido_bin
          chmod +x ./caido_bin
          sudo mv ./caido_bin /usr/local/bin/caido
          
          # 実行確認
          caido --version

      - name: Run Caido Scan
        id: run_scan
        env:
          CAIDO_API_TOKEN: ${{ secrets.CAIDO_API_TOKEN }}
        run: |
          # --workflow にリポジトリ内のJSONを指定
          caido workflow run --workflow .caido/sast-scanner.json --input . --format json > results.json
        continue-on-error: true

      - name: Post Result Comment
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "### 🛡️ Caido Security Scan Result\n\n";
            try {
              if (fs.existsSync('results.json')) {
                const data = JSON.parse(fs.readFileSync('results.json', 'utf8'));
                const findings = data.findings || [];
                if (findings.length === 0) {
                  body += "✅ 脆弱性は見つかりませんでした。";
                } else {
                  body += "| Severity | File | Line | Message |\n| :--- | :--- | :--- | :--- |\n";
                  findings.forEach(f => {
                    const icon = f.severity === 'CRITICAL' ? '🔴' : '🟡';
                    body += `| ${icon} ${f.severity} | \`${f.file}\` | ${f.line} | ${f.message} |\n`;
                  });
                }
              } else {
                body += "⚠️ スキャン結果ファイル(results.json)が生成されませんでした。";
              }
            } catch (e) {
              body += "❌ スキャン結果の解析中にエラーが発生しました。";
              console.log(e);
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
