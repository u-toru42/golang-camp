name: Caido SAST Security Scan

on:
  pull_request: # すべてのPRが対象
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      pull-requests: write # PRへのコメント投稿に必須

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Binary URL
        id: set_url
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "URL=https://github.com/caido/caido/releases/latest/download/caido-cli-linux-x86_64.tar.gz" >> $GITHUB_OUTPUT
          else
            echo "URL=https://github.com/caido/caido/releases/latest/download/caido-cli-macos-x86_64.tar.gz" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Install Caido CLI
        run: |
          curl -L ${{ steps.set_url.outputs.URL }} | tar xz
          chmod +x caido
          sudo mv caido /usr/local/bin/

      - name: Run Caido Scan
        id: run_scan
        env:
          CAIDO_API_TOKEN: ${{ secrets.CAIDO_API_TOKEN }}
        run: |
          # --workflow にリポジトリ内のJSONを指定
          caido workflow run --workflow .caido/sast-scanner.json --input . --format json > results.json
        continue-on-error: true # ここをrunと同じ列に揃えました

      - name: Post Result Comment
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "### 🛡️ Caido Security Scan Result\n\n";
            try {
              if (fs.existsSync('results.json')) {
                const data = JSON.parse(fs.readFileSync('results.json', 'utf8'));
                // findingsの中身を確認して抽出
                const findings = data.findings || [];
                if (findings.length === 0) {
                  body += "✅ 脆弱性は見つかりませんでした。";
                } else {
                  body += "| Severity | File | Line | Message |\n| :--- | :--- | :--- | :--- |\n";
                  findings.forEach(f => {
                    const icon = f.severity === 'CRITICAL' ? '🔴' : '🟡';
                    body += `| ${icon} ${f.severity} | \`${f.file}\` | ${f.line} | ${f.message} |\n`;
                  });
                }
              } else {
                body += "⚠️ スキャン結果ファイル(results.json)が生成されませんでした。";
              }
            } catch (e) {
              body += "❌ スキャン結果の解析中にエラーが発生しました。";
              console.log(e);
            }
            
            // コメントの投稿を実行
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
