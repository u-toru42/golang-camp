name: Go

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: design_patterns

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false

    - name: Install dependencies
      run: go mod download

    - name: Check Format
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "以下のファイルのフォーマットが正しくありません:"
          gofmt -l .
          exit 1
        fi

    - name: go check (vet)
      run: go vet ./...

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...