# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    # 実行ディレクトリを go.mod がある場所に固定する設定
    defaults:
      run:
        working-directory: golang-camp/design_patterns
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: golang-camp/design_patterns/go.sum

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
