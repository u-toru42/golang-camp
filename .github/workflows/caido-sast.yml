name: Caido SAST Security Scan

on:
  pull_request: # すべてのPRが対象
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      pull-requests: write # PRへのコメント投稿に必須

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Binary URL and Format
        id: set_url
        run: |
          # APIから最新のJSONを取得
          JSON_DATA=$(curl -s https://api.caido.io/releases/latest)
          
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "linux" and .arch == "x86_64") | .link')
            FORMAT="tar.gz"
          else
            ARCH=$(uname -m)
            if [[ "$ARCH" == "arm64" ]]; then
              URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "macos" and .arch == "aarch64") | .link')
            else
              URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "macos" and .arch == "x86_64") | .link')
            fi
            FORMAT="zip"
          fi
          
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "FORMAT=$FORMAT" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Caido CLI
        run: |
          URL="${{ steps.set_url.outputs.URL }}"
          FORMAT="${{ steps.set_url.outputs.FORMAT }}"
          
          rm -rf ./caido_install
          mkdir -p ./caido_install
          
          if [[ "$FORMAT" == "tar.gz" ]]; then
            curl -L "$URL" -o caido_archive.tar.gz
            tar -xzf caido_archive.tar.gz -C ./caido_install
          else
            curl -L "$URL" -o caido_archive.zip
            unzip -o caido_archive.zip -d ./caido_install
          fi
          
          # バイナリを特定（名前は変えずにパスだけ通す）
          BINARY_PATH=$(find ./caido_install -type f \( -name "caido" -o -name "caido-cli" \) | head -n 1)
          chmod +x "$BINARY_PATH"
          
          # システムパスに 'caido-cli' としてコピー
          sudo cp -f "$BINARY_PATH" /usr/local/bin/caido-cli
          # 互換性のために 'caido' としてもコピー
          sudo cp -f "$BINARY_PATH" /usr/local/bin/caido
          
          caido-cli --version

      - name: Run Caido Scan
        id: run_scan
        env:
          CAIDO_API_TOKEN: ${{ secrets.CAIDO_API_TOKEN }}
        run: |
          # results.json を空のJSONで初期化
          echo '{"findings": []}' > results.json
          
          # 正しいコマンド：caido-cli workflow run
          # エラーも results.json に出力してデバッグ可能にする
          caido-cli workflow run .caido/sast-scanner.json --input . --format json > results.json 2>&1 || true
        continue-on-error: true

      - name: Debug results.json
        run: |
          echo "=== 実行コマンドのヘルプを表示（デバッグ用） ==="
          caido-cli workflow run --help || true
          echo "=== results.json の中身を表示します ==="
          cat results.json || echo "ファイルを開けません"

      - name: Post Result Comment
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "### 🛡️ Caido Security Scan Result\n\n";
            try {
              if (fs.existsSync('results.json')) {
                const content = fs.readFileSync('results.json', 'utf8').trim();
                
                // JSONでない（エラーメッセージなどの）場合の処理
                if (!content.startsWith('{')) {
                   body += "⚠️ スキャン実行中にエラーが発生しました。\n\n**実行ログ:**\n```\n" + content + "\n```";
                } else {
                  const data = JSON.parse(content);
                  const findings = data.findings || [];
                  if (findings.length === 0) {
                    body += "✅ 脆弱性は見つかりませんでした。";
                  } else {
                    body += "| Severity | File | Line | Message |\n| :--- | :--- | :--- | :--- |\n";
                    findings.forEach(f => {
                      const icon = f.severity === 'CRITICAL' ? '🔴' : '🟡';
                      body += `| ${icon} ${f.severity} | \`${f.file}\` | ${f.line} | ${f.message} |\n`;
                    });
                  }
                }
              } else {
                body += "⚠️ スキャン結果ファイルが生成されませんでした。";
              }
            } catch (e) {
              body += "❌ 結果の解析中に予期せぬエラーが発生しました。\n" + e.message;
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });