name: Go Quality Assurance

on:
  push:
  pull_request:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: design_patterns

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false # go.sumがない環境への配慮

    - name: Verify Dependencies
      run: go mod verify

    - name: Check Format
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Error: Code is not formatted. Run 'go fmt ./...' locally."
          gofmt -l .
          exit 1
        fi

    - name: Static Analysis
      run: go vet ./...

    - name: Build (Fowler's CI)
      run: go build -v ./...

    - name: Run Tests with Coverage
      run: go test -v -race -covermode=atomic ./...