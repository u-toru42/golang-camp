name: Caido SAST Security Scan

on:
  pull_request: # すべてのPRが対象
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      pull-requests: write # PRへのコメント投稿に必須

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Binary URL and Format
        id: set_url
        run: |
          # APIから最新のJSONを取得
          JSON_DATA=$(curl -s https://api.caido.io/releases/latest)
          
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            # Linux x86_64 のリンクを抽出
            URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "linux" and .arch == "x86_64") | .link')
            FORMAT="tar.gz"
          else
            # macOS のアーキテクチャを判定してリンクを抽出
            ARCH=$(uname -m)
            if [[ "$ARCH" == "arm64" ]]; then
              URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "macos" and .arch == "aarch64") | .link')
            else
              URL=$(echo "$JSON_DATA" | jq -r '.links[] | select(.kind == "cli" and .os == "macos" and .arch == "x86_64") | .link')
            fi
            FORMAT="zip"
          fi
          
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "FORMAT=$FORMAT" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Caido CLI
        run: |
          URL="${{ steps.set_url.outputs.URL }}"
          FORMAT="${{ steps.set_url.outputs.FORMAT }}"
          
          # 1. 完全にクリーンな一時ディレクトリで解凍する
          mkdir -p ./caido_install
          if [[ "$FORMAT" == "tar.gz" ]]; then
            curl -L "$URL" -o caido_archive.tar.gz
            tar -xzf caido_archive.tar.gz -C ./caido_install
          else
            curl -L "$URL" -o caido_archive.zip
            unzip -o caido_archive.zip -d ./caido_install
          fi
          
          # 2. ワークフローファイルとの混同を避けるため、絶対パスでバイナリを特定
          # 解凍されたディレクトリ内にある実行ファイル（caido-cli または caido）を取得
          BINARY_PATH=$(find ./caido_install -type f -executable | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Binary not found in ./caido_install"
            ls -R ./caido_install
            exit 1
          fi
          
          echo "Found binary at: $BINARY_PATH"
          chmod +x "$BINARY_PATH"
          sudo mv "$BINARY_PATH" /usr/local/bin/caido
          
          # 3. 確実に本物であることを確認
          /usr/local/bin/caido --version

      - name: Run Caido Scan
        id: run_scan
        env:
          CAIDO_API_TOKEN: ${{ secrets.CAIDO_API_TOKEN }}
        run: |
          # コマンドを最新の推奨形式（positional argument）に修正
          # results.json を空ファイルで初期化しておく
          touch results.json
          caido workflow run .caido/sast-scanner.json --input . --format json > results.json
        continue-on-error: true

      - name: Debug results.json
        run: |
          echo "=== results.json の中身を表示します ==="
          ls -lh results.json || echo "ファイルが存在しません"
          cat results.json || echo "ファイルを開けません"
          echo "========================================"

      - name: Post Result Comment
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "### 🛡️ Caido Security Scan Result\n\n";
            try {
              if (fs.existsSync('results.json')) {
                const data = JSON.parse(fs.readFileSync('results.json', 'utf8'));
                const findings = data.findings || [];
                if (findings.length === 0) {
                  body += "✅ 脆弱性は見つかりませんでした。";
                } else {
                  body += "| Severity | File | Line | Message |\n| :--- | :--- | :--- | :--- |\n";
                  findings.forEach(f => {
                    const icon = f.severity === 'CRITICAL' ? '🔴' : '🟡';
                    body += `| ${icon} ${f.severity} | \`${f.file}\` | ${f.line} | ${f.message} |\n`;
                  });
                }
              } else {
                body += "⚠️ スキャン結果ファイル(results.json)が生成されませんでした。";
              }
            } catch (e) {
              body += "❌ スキャン結果の解析中にエラーが発生しました。";
              console.log(e);
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
